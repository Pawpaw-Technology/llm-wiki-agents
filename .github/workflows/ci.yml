name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone codebridge dependency
        run: git clone --depth 1 https://github.com/64andrewwalker/codebridge.git ../tool/codebridge

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install codebridge deps
        run: npm install --prefix ../tool/codebridge

      - run: npm install

      - run: npx tsc --noEmit --skipLibCheck
